name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp

  # Build and attach macOS binaries only when a release was just created.
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    # Both macOS arches are cross-compiled on a single Apple Silicon runner
    # (the macOS SDK is universal), which avoids waiting on a separate Intel
    # runner.
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build and package
        run: |
          set -euo pipefail
          tag="${{ needs.release-please.outputs.tag_name }}"
          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            cargo build --release --target "$target"
            dist="strobetune-${tag}-${target}"
            mkdir -p "$dist"
            cp "target/${target}/release/strobetune" "$dist/"
            cp README.md LICENSE "$dist/"
            tar -czf "${dist}.tar.gz" -C "$dist" .
            shasum -a 256 "${dist}.tar.gz" | tee "${dist}.tar.gz.sha256"
          done

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            strobetune-*.tar.gz strobetune-*.tar.gz.sha256 --clobber
